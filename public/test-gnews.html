<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsAPI.org API Test</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f0f0; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        .loading { color: blue; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 NewsAPI.org API Key Test</h1>
        <p>Testing new API key: <code>YOUR_NEWSAPIORG_KEY_HERE</code></p>
        <div id="result" class="loading">Testing...</div>
        <pre id="details"></pre>
    </div>

    <script>
        const apiKey = '6adb7309f62f55b193c6e84f68a968ad';
        const url = `https://newsapi.org/v2/top-headlines?apiKey=${apiKey}&pageSize=5&country=us`;

        fetch(url)
            .then(response => response.json())
            .then(data => {
                const resultDiv = document.getElementById('result');
                const detailsDiv = document.getElementById('details');

                if (data.articles && Array.isArray(data.articles)) {
                    resultDiv.className = 'success';
                    resultDiv.textContent = `✅ NewsAPI.org API is WORKING! (${data.articles.length} articles found)`;
                    detailsDiv.textContent = JSON.stringify(data.articles.slice(0, 1), null, 2);
                } else if (data.error) {
                    resultDiv.className = 'error';
                    resultDiv.textContent = `❌ API Error: ${data.error}`;
                    detailsDiv.textContent = JSON.stringify(data, null, 2);
                } else {
                    resultDiv.className = 'error';
                    resultDiv.textContent = `❌ Unexpected response`;
                    detailsDiv.textContent = JSON.stringify(data, null, 2);
                }
            })
            .catch(error => {
                document.getElementById('result').className = 'error';
                document.getElementById('result').textContent = `❌ Request failed: ${error.message}`;
                document.getElementById('details').textContent = error.toString();
            });
    </script>
</body>
</html>
